        - heading "Giới thiệu bản thân – Mục tiêu nghề nghiệp" [level=2] [ref=e31]
        - generic [ref=e34]:
          - paragraph [ref=e35]: Tôi tốt nghiệp Kỹ sư Khoa học Máy tính từ IUH, hiện đang tập trung phát triển sự nghiệp chuyên sâu trong vai trò AI/ML Engineer. Với nền tảng vững chắc về Computer Vision và Deep Learning, mục tiêu ngắn hạn của tôi (trong 2-3 năm tới) là tham gia vào các dự án thực tế để tối ưu hóa các kiến trúc mô hình (như YOLO, RT-DETR) và triển khai chúng hiệu quả trên môi trường production. Đồng thời, tôi đang đầu tư mạnh mẽ vào việc nghiên cứu LLMs Engineer, cụ thể là xây dựng các hệ thống RAG và tối ưu hóa Prompt Engineering để tạo ra các giải pháp ngôn ngữ có độ chính xác cao.
          - paragraph [ref=e36]: "Trong dài hạn, tôi hướng tới trở thành một Chuyên gia về AI có khả năng thiết kế và dẫn dắt các hệ thống trí tuệ nhân tạo đa phương thức (Multimodal) phức tạp. Tôi không chỉ dừng lại ở việc huấn luyện mô hình mà còn chú trọng vào tư duy hệ thống: từ việc xây dựng data pipeline sạch, quản lý vòng đời mô hình (MLOps) đến việc giải quyết các bài toán hóc búa về hiệu suất và chi phí triển khai. Tôi khao khát đóng góp vào những sản phẩm AI có tác động thực tiễn lớn, mang lại giá trị bền vững cho người dùng và doanh nghiệp."
